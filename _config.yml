title: Trinity Anglican Church - South Christchurch

author:
  name: Trinity South Christchurch
  email: info@trinitysc.nz

# The `>` after `description:` means to ignore line-breaks until next key.
# If you want to omit the line-break after the end of text, use `>-` instead.
description: >-
  Trinity South Christchurch is an Anglican evangelical church passionate about the gospel of Jesus.
  We are captivated by Jesus, committed to the gospel, and compelled to make disciples.

collections:
  articles:
    output: true
  team:
    output: true
  members:
    output: true
  ministries:
    output: true
  events:
    output: true
    permalink: "/events/:name"
  missions:
    output: true
  series:
    output: true

excerpt_separator: <!--excerpt end-->

defaults:
 - scope:
      path: ""
   values:
      layout: "page"

# Allow pages with a data attribute to be displayed even if the date is in the future
# (Default is to return a 404)
future:
  true

plugins:
  - jekyll-feed
  - jekyll-seo-tag



